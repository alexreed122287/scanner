name: Score Industry Themes

on:
  schedule:
    # 22:00 UTC = 5 PM EST / 6 PM EDT — runs ~30 min after market close
    - cron: '0 22 * * 1-5'
  workflow_dispatch:  # allow manual trigger from Actions tab

permissions:
  contents: write
  issues: write   # F-3: needed for the failure-notification step

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # No pip cache — repo has no requirements.txt / pyproject.toml so
          # cache: 'pip' fails with "No file matched". Deps are inlined below
          # and the install is fast enough (~15s) that caching saves nothing.

      - name: Install deps
        # Pinned to prevent silent breakage from upstream regressions.
        # yfinance has had ≥4 major schema changes in 18 months — an unpinned
        # install ships with whatever the latest is and can quietly produce
        # all-NaN scores that get committed without anyone noticing.
        # pytest is added for the post-scoring smoke test (test_theme_scores.py).
        run: pip install 'yfinance==0.2.55' 'pandas>=2.2,<3' 'numpy>=2,<3' 'requests>=2.32,<3' 'pytest>=8'

      - name: Run scoring engine
        env:
          TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}
        run: python industry/score_themes.py

      - name: Smoke-test fresh theme_scores.json
        # Hard gate between scoring and commit. If the new snapshot is
        # malformed / degenerate / stale, abort the run so the previous
        # (good) snapshot stays in place. F-3's failure-notification step
        # will then open a GitHub issue.
        run: pytest industry/test_theme_scores.py -v

      - name: Commit refreshed scores
        run: |
          git config user.name "theme-scorer-bot"
          git config user.email "theme-scorer@users.noreply.github.com"
          git add industry/theme_scores.json industry/theme_scores_history.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: refresh theme scores $(date -u +%Y-%m-%d)"
            git push
          fi

      # F-3: surface failures as a GitHub issue. GH Actions auto-disables a
      # scheduled workflow after 60 days without any successful run on the
      # default branch, AND silent infra/yfinance breakage can produce a
      # streak of failures the user never notices because the cron is
      # background. Open an issue on failure (deduped via the
      # `cron-failure` label so we don't spam — only one open issue at a time).
      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Make sure the dedup label exists before we try to filter by it.
          gh label create cron-failure --description "score_themes workflow failures" --color d73a4a 2>/dev/null || true
          existing=$(gh issue list --label cron-failure --state open --json number --jq '.[0].number' || echo "")
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ts=$(date -u +%Y-%m-%dT%H:%MZ)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Cron failed again on ${ts}. Run: ${run_url}"
          else
            body="The score_themes workflow failed on ${ts}. Run: ${run_url}. This issue will be re-used for subsequent failures (commented on rather than reopened) and should be closed once the underlying problem is fixed."
            gh issue create --title "score_themes cron failed: $(date -u +%Y-%m-%d)" --label cron-failure --body "$body"
          fi
