name: Daily Picks Email

# Fires every weekday morning. Uses two cron entries to keep the local
# delivery time stable across DST:
#   - 13:00 UTC = 08:00 CDT (Mar–Nov) / 07:00 CST (Nov–Mar)
#   - 14:00 UTC = 09:00 CDT (Mar–Nov) / 08:00 CST (Nov–Mar)
# Pick ONE of these by uncommenting + leaving the other commented, or run
# manually via the Run workflow button. The script soft-fails if any
# required secret is missing, so it's safe to leave on a schedule even
# before you configure Resend.
on:
  schedule:
    # Daily at 13:00 UTC (Mon–Fri) — 8 AM CDT / 7 AM CST
    - cron: "0 13 * * 1-5"
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install requests
      - name: Compose + send daily picks
        env:
          TRADIER_TOKEN:  ${{ secrets.TRADIER_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          DAILY_PICKS_MIN_CALL_PCT: ${{ vars.DAILY_PICKS_MIN_CALL_PCT }}
          DAILY_PICKS_MAX_PICKS:    ${{ vars.DAILY_PICKS_MAX_PICKS }}
        run: python daily_picks/run_daily_picks.py
